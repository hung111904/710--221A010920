<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bài tập 2 - Form đăng ký</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9fafc; /* nền sáng nhẹ */
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #4CAF50; /* xanh lá đồng bộ */
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .form-container {
      max-width: 400px;
      margin: 30px auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
    }
    input, button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      background-color: #4CAF50;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #45a049;
    }
    label {
      display: block;
      margin: 10px 0;
      font-size: 14px;
      color: #555;
    }
    .success {
      color: #4CAF50;
      font-weight: bold;
      text-align: center;
    }
    .error {
      color: #d9534f;
      text-align: center;
    }
    footer {
      background-color: #f1f1f1;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #555;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Form đăng ký</h1>
  </header>

  <div class="form-container">
    <form id="registerForm">
      <input type="text" id="name" placeholder="Tên" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Mật khẩu" required>
      <label><input type="checkbox" id="terms"> Đồng ý điều khoản</label>
      <button type="submit">Đăng ký</button>
    </form>
    <p id="message"></p>
  </div>

  <footer>
    &copy; 2026 - Trang chính 710
  </footer>

    const message = document.getElementById("message");
