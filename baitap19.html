<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Kết quả Bài tập 19 - Memory Card Game</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
    }
    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: 20px auto;
    }
    .card {
      perspective: 1000px;
      cursor: pointer;
    }
    .card-inner {
      position: relative;
      width: 100%;
      padding-top: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      backface-visibility: hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2rem;
      border:1px solid #ccc;
      border-radius:8px;
    }
    .card-front {
      background:#3498db;
      color:#fff;
    }
    .card-back {
      background:#eee;
      transform: rotateY(180deg);
    }
    @media (max-width: 600px) {
      .game-board {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <h1>Kết quả Bài tập 19: Memory Card Flip Game</h1>
  <section class="game-board"></section>
  <p id="moves">Moves: 0</p>
  <button id="reset">Reset Game</button>
  <p><a href="index.html">← Về Menu chính</a></p>

  <script>
    const board = document.querySelector('.game-board');
    const movesDisplay = document.getElementById('moves');
    const resetBtn = document.getElementById('reset');

    let cards = ['🍎','🍎','🍌','🍌','🍇','🍇','🍓','🍓'];
    let flipped = [];
    let matched = [];
    let moves = 0;

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
      board.innerHTML = '';
      moves = 0;
      movesDisplay.textContent = 'Moves: 0';
      matched = [];
      flipped = [];
      shuffle(cards).forEach(symbol => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">?</div>
            <div class="card-back">${symbol}</div>
          </div>`;
        card.addEventListener('click', () => flipCard(card, symbol));
        board.appendChild(card);
      });
    }

    function flipCard(card, symbol) {
      if (flipped.length < 2 && !card.classList.contains('flipped')) {
        card.classList.add('flipped');
        flipped.push({card, symbol});
        if (flipped.length === 2) {
          moves++;
          movesDisplay.textContent = 'Moves: ' + moves;
          checkMatch();
        }
      }
    }

    function checkMatch() {
      const [first, second] = flipped;
      if (first.symbol === second.symbol) {
        matched.push(first.symbol);
        flipped = [];
        if (matched.length === cards.length/2) {
          setTimeout(() => alert('Bạn đã thắng sau ' + moves + ' moves!'), 500);
        }
      } else {
        setTimeout(() => {
          first.card.classList.remove('flipped');
          second.card.classList.remove('flipped');
          flipped = [];
        }, 1000);
      }
    }

    resetBtn.addEventListener('click', initGame);
    initGame();
  </script>
</body>
</html>
